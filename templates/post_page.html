<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page_url }}">
  <meta property="og:image" content="{{ image_url }}">
  <meta property="og:image:secure_url" content="{{ image_url }}">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta property="vk:image" content="{{ image_url }}">

  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="{{ page_url }}">
  <link rel="image_src" href="{{ image_url }}">
</head>
<body style="margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827;">
  <main style="max-width:900px;margin:0 auto;padding:40px 20px;">
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>
    <img src="{{ image_url }}" alt="{{ title }}" style="max-width:100%;height:auto;border-radius:16px;">
    <div style="margin-top:24px;">
      {{ body_html | safe }}
    </div>
  </main>
</body>
</html>
